<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Trackr</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <!-- PWA -->
  <meta name="theme-color" content="#F0E9DF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Trackr">
  <link rel="apple-touch-icon" id="pwa-icon">
  <link rel="icon" type="image/png" id="pwa-favicon">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #F0E9DF;
      --card:       #E6DDD2;
      --card-deep:  #D9CFC3;
      --text:       #2C1F14;
      --text-mid:   #6B5441;
      --text-light: #9B8572;
      --green:      #4A6741;
      --accent:     #8B5C2A;
      --r:          20px;
      --r-sm:       12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    * { -webkit-tap-highlight-color: transparent; }

    /* ─── WELCOME ─── */
    #welcome {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 300;
      transition: transform .8s cubic-bezier(.76,0,.24,1);
      cursor: pointer; user-select: none;
    }
    #welcome.gone { transform: translateY(-100%); pointer-events: none; }

    .w-hi {
      font-family: 'Cormorant Garamond', serif;
      font-size: 52px; font-weight: 300;
      color: var(--text); line-height: 1;
    }
    .w-aw {
      font-family: 'Cormorant Garamond', serif;
      font-size: 52px; font-weight: 300;
      color: var(--green); line-height: 1.1;
      margin-bottom: 18px;
    }
    .w-date {
      font-size: 14px; color: var(--text-mid);
      letter-spacing: .02em; margin-bottom: 64px;
    }
    .swipe-wrap {
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
    }
    .swipe-circle {
      width: 38px; height: 38px; border-radius: 50%;
      border: 1.5px solid var(--text-light);
      display: flex; align-items: center; justify-content: center;
      animation: bob 1.7s ease-in-out infinite;
    }
    .swipe-lbl {
      font-size: 10px; letter-spacing: .18em;
      color: var(--text-light); text-transform: uppercase;
    }
    @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }

    /* ─── APP SHELL ─── */
    #app {
      max-width: 430px; margin: 0 auto;
      min-height: 100vh; position: relative;
    }

    /* ─── PAGES ─── */
    .page { padding: 0 16px 96px; min-height: 100vh; }

    .ph { padding: 22px 0 14px; }
    .ph-row { display: flex; align-items: flex-end; justify-content: space-between; }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px; font-weight: 500; color: var(--text);
    }
    .page-sub { font-size: 13px; color: var(--text-mid); margin-top: 3px; }

    /* ─── HOME HEADER ─── */
    .home-hd { text-align: center; padding: 22px 0 12px; }
    .trackr-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 34px; font-weight: 500;
      color: var(--accent); letter-spacing: .06em;
    }

    /* ─── CARDS ─── */
    .card {
      background: var(--card);
      border-radius: var(--r);
      padding: 16px; margin-bottom: 12px;
    }
    .card-title {
      font-size: 10px; font-weight: 500;
      letter-spacing: .14em; text-transform: uppercase;
      color: var(--text-light); margin-bottom: 14px;
    }

    /* ─── DONUT ─── */
    .donut-wrap {
      position: relative;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .donut-inner {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 600; color: var(--text);
    }

    /* ─── HABITS ─── */
    .habit-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px; border-radius: 13px;
      cursor: pointer; border: 1px solid transparent;
      transition: background .22s, border-color .22s;
      margin-bottom: 6px;
    }
    .habit-row:last-child { margin-bottom: 0; }
    .h-icon { font-size: 20px; transition: opacity .22s; }
    .h-name {
      flex: 1; font-size: 14px; color: var(--text);
      transition: color .22s, text-decoration .22s;
    }
    .h-name.done { color: var(--text-light); text-decoration: line-through; }
    .h-check {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid #C8BDB0; background: transparent;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all .22s;
      font-size: 11px; color: white; line-height: 1;
    }
    .h-del {
      background: none; border: none;
      color: #B85C4A; font-size: 16px; cursor: pointer; padding: 0 4px;
    }

    /* ─── BARS ─── */
    .bars { display: flex; gap: 6px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .bar-track {
      width: 100%; height: 60px;
      background: var(--card-deep); border-radius: 7px;
      position: relative; overflow: hidden;
    }
    .bar-fill {
      position: absolute; bottom: 0; left: 0; right: 0;
      border-radius: 7px;
      transition: height .5s cubic-bezier(.4,0,.2,1);
    }
    .bar-lbl { font-size: 9px; color: var(--text-light); }
    .bar-lbl.today { color: var(--text); font-weight: 600; }

    /* ─── DAY TOGGLE ─── */
    .day-toggle {
      display: flex; background: var(--card);
      border-radius: 13px; padding: 4px; margin-bottom: 12px;
    }
    .day-btn {
      flex: 1; padding: 8px; border: none;
      background: transparent; border-radius: 10px;
      font-size: 13px; font-family: 'DM Sans', sans-serif;
      color: var(--text-light); cursor: pointer;
      transition: all .2s;
    }
    .day-btn.active { background: var(--bg); color: var(--text); font-weight: 500; }

    /* ─── TODO ─── */
    .todo-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 0; border-bottom: 1px solid var(--card-deep);
    }
    .todo-row:last-of-type { border-bottom: none; }
    .t-chk {
      width: 20px; height: 20px; border-radius: 5px;
      border: 2px solid #B8AB9E; background: transparent;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s; font-size: 11px; color: white; line-height: 1;
    }
    .t-text {
      flex: 1; font-size: 14px; color: var(--text); transition: all .22s;
    }
    .t-text.done { color: var(--text-light); text-decoration: line-through; }
    .t-del {
      background: none; border: none;
      color: #C8B8A8; font-size: 20px; cursor: pointer;
      padding: 0 2px; line-height: 1; flex-shrink: 0;
    }

    /* ─── INPUTS ─── */
    .add-row { display: flex; gap: 8px; margin-top: 12px; }
    .add-inp {
      flex: 1; padding: 10px 12px;
      background: var(--bg); border: none;
      border-radius: 11px; font-size: 13px;
      color: var(--text); font-family: 'DM Sans', sans-serif; outline: none;
    }
    .add-inp::placeholder { color: var(--text-light); }
    .add-btn {
      width: 40px; height: 40px; flex-shrink: 0;
      background: var(--green); color: white;
      border: none; border-radius: 11px;
      font-size: 22px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s;
    }
    .add-btn:active { transform: scale(.9); }

    .form-inp {
      width: 100%; padding: 10px 12px;
      background: var(--bg); border: none;
      border-radius: 11px; font-size: 13px;
      color: var(--text); font-family: 'DM Sans', sans-serif;
      outline: none; margin-bottom: 9px;
    }
    .form-inp::placeholder { color: var(--text-light); }

    .type-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .t-pill {
      padding: 6px 11px; border: none; border-radius: 8px;
      font-size: 11px; background: var(--card-deep);
      color: var(--text-mid); cursor: pointer;
      font-family: 'DM Sans', sans-serif; transition: all .18s;
    }
    .submit-btn {
      width: 100%; padding: 11px;
      background: var(--green); color: white;
      border: none; border-radius: 11px;
      font-size: 13px; font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: opacity .2s;
    }
    .submit-btn:active { opacity: .85; }

    /* ─── EDIT BTN ─── */
    .edit-btn {
      font-size: 11px; background: none; border: none;
      color: var(--accent); cursor: pointer;
      font-weight: 500; letter-spacing: .05em;
      font-family: 'DM Sans', sans-serif;
    }

    /* ─── FAB ─── */
    .fab {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--green); color: white;
      border: none; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .18s;
    }
    .fab:active { transform: scale(.9); }

    /* ─── COUNTDOWN ─── */
    .cd-item {
      background: var(--card); border-radius: var(--r);
      padding: 14px 16px;
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 10px; border: 1px solid transparent;
    }
    .cd-badge {
      width: 56px; height: 56px; border-radius: 14px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; flex-shrink: 0;
    }
    .cd-days { font-size: 22px; font-weight: 700; line-height: 1; }
    .cd-j { font-size: 9px; letter-spacing: .1em; }
    .cd-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
    .cd-meta { display: flex; align-items: center; gap: 6px; }
    .type-tag {
      font-size: 10px; padding: 2px 8px;
      border-radius: 4px; font-weight: 500;
    }
    .cd-date { font-size: 11px; color: var(--text-light); }

    /* ─── MISC ─── */
    .empty {
      font-size: 13px; color: var(--text-light);
      font-style: italic; text-align: center; padding: 16px 0;
    }
    .meta-txt { font-size: 12px; color: var(--text-mid); margin-bottom: 8px; }
    .sep { color: var(--text-light); }
    .flex-row { display: flex; align-items: center; }
    .flex-bet { display: flex; align-items: center; justify-content: space-between; }

    /* ─── BOTTOM NAV ─── */
    #bnav {
      position: fixed; bottom: 0;
      left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: #EAE2D8;
      border-top: 1px solid #D4C9BC;
      display: flex; padding: 8px 0 22px; z-index: 100;
    }
    .n-btn {
      flex: 1; background: none; border: none;
      display: flex; flex-direction: column;
      align-items: center; gap: 3px;
      cursor: pointer; padding: 4px 0;
    }
    .n-ico { color: var(--text-light); transition: color .2s; }
    .n-ico svg { display: block; }
    .n-lbl {
      font-size: 9px; letter-spacing: .05em;
      color: var(--text-light); font-weight: 400;
      transition: all .2s;
    }
    .n-btn.active .n-ico { color: var(--accent); }
    .n-btn.active .n-lbl { color: var(--accent); font-weight: 500; }
  </style>
</head>
<body>

<!-- ══════════ WELCOME ══════════ -->
<div id="welcome">
  <div style="text-align:center;padding:0 40px;max-width:380px">
    <p class="w-hi">hi,</p>
    <p class="w-aw">academic weapon</p>
    <p class="w-date" id="w-date"></p>
    <div class="swipe-wrap">
      <div class="swipe-circle">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"
             stroke="#9B8572" stroke-width="1.8" stroke-linecap="round">
          <line x1="7" y1="12" x2="7" y2="2"/>
          <polyline points="3,6 7,2 11,6"/>
        </svg>
      </div>
      <span class="swipe-lbl">Glissez vers le haut</span>
    </div>
  </div>
</div>

<!-- ══════════ APP ══════════ -->
<div id="app">
  <div id="pg"></div>

  <nav id="bnav">
    <button class="n-btn" id="nb-home" onclick="go('home')">
      <span class="n-ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg></span>
      <span class="n-lbl">Accueil</span>
    </button>
    <button class="n-btn" id="nb-habits" onclick="go('habits')">
      <span class="n-ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
      <span class="n-lbl">Habitudes</span>
    </button>
    <button class="n-btn" id="nb-todos" onclick="go('todos')">
      <span class="n-ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><polyline points="4,6 5,7 7,5"/><polyline points="4,12 5,13 7,11"/><polyline points="4,18 5,19 7,17"/></svg></span>
      <span class="n-lbl">À faire</span>
    </button>
    <button class="n-btn" id="nb-cd" onclick="go('cd')">
      <span class="n-ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg></span>
      <span class="n-lbl">Échéances</span>
    </button>
  </nav>
</div>

<script>
/* ════════════════════════════════
   STATE
════════════════════════════════ */
const DEF_HABITS = [
  {id:'musculation', name:'Musculation',     icon:'🏋️', color:'#5B7A4E'},
  {id:'hygiene',     name:'Hygiène',         icon:'✨',  color:'#5A9E8F'},
  {id:'lecture',     name:'Lire 10 pages',   icon:'📖', color:'#C4953A'},
  {id:'scolaire',    name:'Travail scolaire',icon:'📚', color:'#7B6FA8'},
  {id:'projects',    name:'Side projects',   icon:'⚡',  color:'#C47845'},
  {id:'eau',         name:'2L d\'eau',       icon:'💧', color:'#4A8EBF'},
];

const TYPE = {
  'Événement': {c:'#4A7FA8', bg:'rgba(74,127,168,.13)'},
  'Deadline':  {c:'#B85C4A', bg:'rgba(184,92,74,.13)'},
  'Examen':    {c:'#7B6FA8', bg:'rgba(123,111,168,.13)'},
  'Devoir':    {c:'#C4953A', bg:'rgba(196,149,58,.13)'},
};

const S = {
  tab: 'home',
  habits: JSON.parse(JSON.stringify(DEF_HABITS)),
  history: {},   // {dateKey: {habitId: bool}}
  todos: {},     // {dateKey: [{id,text,completed}]}
  cds: [],       // [{id,title,date,type}]
  editH: false,
  tmrw: false,
  addCd: false,
  cdType: 'Événement',
};

/* ════════════════════════════════
   STORAGE
════════════════════════════════ */
// ⚠️ STORAGE KEYS — NE JAMAIS MODIFIER CES NOMS ⚠️
// Changer ces clés détruirait les données sauvegardées des utilisateurs.
// Toute modification du code doit conserver ces 4 identifiants exacts.
//
//   'trk_h'  → config des habitudes  (S.habits)
//   'trk_hi' → historique quotidien  (S.history)
//   'trk_t'  → todos par jour        (S.todos)
//   'trk_c'  → countdowns            (S.cds)
//
const KEYS = Object.freeze({
  habits:  'trk_h',
  history: 'trk_hi',
  todos:   'trk_t',
  cds:     'trk_c',
});
// ─────────────────────────────────────────────

function save() {
  try { localStorage.setItem(KEYS.habits,  JSON.stringify(S.habits));  } catch(e){}
  try { localStorage.setItem(KEYS.history, JSON.stringify(S.history)); } catch(e){}
  try { localStorage.setItem(KEYS.todos,   JSON.stringify(S.todos));   } catch(e){}
  try { localStorage.setItem(KEYS.cds,     JSON.stringify(S.cds));     } catch(e){}
}
function load() {
  try { const v=localStorage.getItem(KEYS.habits);  if(v) S.habits  = JSON.parse(v); } catch(e){}
  try { const v=localStorage.getItem(KEYS.history); if(v) S.history = JSON.parse(v); } catch(e){}
  try { const v=localStorage.getItem(KEYS.todos);   if(v) S.todos   = JSON.parse(v); } catch(e){}
  try { const v=localStorage.getItem(KEYS.cds);     if(v) S.cds     = JSON.parse(v); } catch(e){}
}

/* ════════════════════════════════
   DATE UTILS
════════════════════════════════ */
function activeDay() {
  const n = new Date();
  if (n.getHours() < 5) { const d=new Date(n); d.setDate(d.getDate()-1); return d; }
  return n;
}
function toKey(d)   { return d.toISOString().split('T')[0]; }
function todayKey() { return toKey(activeDay()); }
function tmrwKey()  { const d=new Date(activeDay()); d.setDate(d.getDate()+1); return toKey(d); }
function curKey()   { return S.tmrw ? tmrwKey() : todayKey(); }
function daysUntil(s) {
  const t=new Date(s+'T00:00:00'), n=new Date(); n.setHours(0,0,0,0);
  return Math.ceil((t-n)/86400000);
}
function fmtShort(s) {
  return new Date(s+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
}
function fmtFull(d) {
  const s = d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  return s.charAt(0).toUpperCase()+s.slice(1);
}

/* ════════════════════════════════
   SVG HELPERS
════════════════════════════════ */
function donut(pct, size=88) {
  const r=(size-14)/2, ci=2*Math.PI*r, off=(ci*(1-pct/100)).toFixed(2);
  return `<div class="donut-wrap" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#D9CFC3" stroke-width="12"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none"
        stroke="#4A6741" stroke-width="12" stroke-linecap="round"
        stroke-dasharray="${ci.toFixed(2)}" stroke-dashoffset="${off}"
        style="transition:stroke-dashoffset .75s cubic-bezier(.4,0,.2,1)"/>
    </svg>
    <div class="donut-inner">${pct}%</div>
  </div>`;
}

function monthChart() {
  const now=new Date(), yr=now.getFullYear(), mo=now.getMonth();
  const dim=new Date(yr,mo+1,0).getDate(), td=now.getDate();
  const W=210, H=78, PX=18, PY=8, pW=W-PX*2, pH=H-PY*2;

  const pts=[];
  for(let day=1;day<=td;day++){
    const d=new Date(yr,mo,day), key=toKey(d);
    const dh=S.history[key]||{};
    const p=S.habits.length ? S.habits.filter(h=>dh[h.id]).length/S.habits.length : 0;
    pts.push([(PX+((day-1)/Math.max(dim-1,1))*pW).toFixed(1),(PY+(1-p)*pH).toFixed(1)]);
  }

  const ok = pts.length>=2;
  const line = ok ? 'M '+pts.map(p=>p.join(',')).join(' L ') : '';
  const area = ok ? `M ${PX},${H-PY} L ${pts.map(p=>p.join(',')).join(' L ')} L ${pts[pts.length-1][0]},${H-PY} Z` : '';

  const xlbls=[1,8,15,22,dim].map(day=>{
    const x=(PX+((day-1)/Math.max(dim-1,1))*pW).toFixed(1);
    return `<text x="${x}" y="${H+14}" text-anchor="middle" font-size="7.5" fill="#9B8572" font-family="DM Sans,sans-serif">${day}</text>`;
  }).join('');

  const grid=[0,.5,1].map(v=>
    `<line x1="${PX}" y1="${(PY+v*pH).toFixed(1)}" x2="${PX+pW}" y2="${(PY+v*pH).toFixed(1)}" stroke="#C8BDB0" stroke-width=".5"/>`
  ).join('');

  const lp=pts[pts.length-1];
  return `<svg width="${W}" height="${H+20}" overflow="visible">
    <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A6741" stop-opacity=".2"/>
      <stop offset="100%" stop-color="#4A6741" stop-opacity="0"/>
    </linearGradient></defs>
    ${grid}
    ${area?`<path d="${area}" fill="url(#ag)"/>`:''}
    ${line?`<path d="${line}" fill="none" stroke="#4A6741" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`:''}
    ${lp?`<circle cx="${lp[0]}" cy="${lp[1]}" r="3.5" fill="#4A6741"/>`:''}
    ${xlbls}
  </svg>`;
}

function bars7() {
  const tk=todayKey();
  return '<div class="bars">'+Array.from({length:7},(_,i)=>{
    const d=new Date(activeDay()); d.setDate(d.getDate()-(6-i));
    const key=toKey(d);
    const dh=S.history[key]||{};
    const p=S.habits.length ? Math.round(S.habits.filter(h=>dh[h.id]).length/S.habits.length*100) : 0;
    const isT=key===tk;
    const lbl=d.toLocaleDateString('fr-FR',{weekday:'short'}).slice(0,2);
    return `<div class="bar-col">
      <div class="bar-track">
        <div class="bar-fill" style="height:${p}%;background:${isT?'#4A6741':'rgba(74,103,65,.5)'}"></div>
      </div>
      <span class="bar-lbl ${isT?'today':''}">${lbl}</span>
    </div>`;
  }).join('')+'</div>';
}

/* ════════════════════════════════
   RENDER PAGES
════════════════════════════════ */
function pgHome() {
  const tk=todayKey();
  const dh=S.history[tk]||{};
  const done=S.habits.filter(h=>dh[h.id]).length;
  const pct=S.habits.length ? Math.round(done/S.habits.length*100) : 0;
  const tds=S.todos[tk]||[];

  const todoHtml = tds.length===0
    ? '<p class="empty">Aucune tâche pour aujourd\'hui</p>'
    : tds.slice(0,4).map((t,i,a)=>`
      <div class="flex-row" style="gap:10px;padding:7px 0;border-bottom:${i<a.length-1?'1px solid var(--card-deep)':'none'}">
        <div style="width:16px;height:16px;border-radius:4px;border:2px solid ${t.completed?'#4A6741':'#B8AB9E'};background:${t.completed?'#4A6741':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
          ${t.completed?'<span style="color:white;font-size:9px;line-height:1">✓</span>':''}
        </div>
        <span style="font-size:13px;color:${t.completed?'var(--text-light)':'var(--text)'};text-decoration:${t.completed?'line-through':'none'}">${esc(t.text)}</span>
      </div>`).join('')
    + (tds.length>4?`<p style="font-size:11px;color:var(--text-light);margin-top:6px">+${tds.length-4} autres tâches</p>`:'');

  const up=S.cds.map(c=>({...c,days:daysUntil(c.date)}))
    .filter(c=>c.days>=0&&c.days<=7).sort((a,b)=>a.days-b.days).slice(0,3);

  const cdHtml = up.length===0
    ? '<p class="empty">Rien dans les 7 prochains jours</p>'
    : up.map(c=>{
        const m=TYPE[c.type]||TYPE['Événement'];
        return `<div class="flex-row" style="gap:12px;margin-bottom:${c===up[up.length-1]?0:10}px">
          <div class="cd-badge" style="background:${m.bg};width:48px;height:48px">
            <span class="cd-days" style="color:${m.c};font-size:18px">${c.days===0?'!':c.days}</span>
            ${c.days>0?`<span class="cd-j" style="color:${m.c}">J</span>`:''}
          </div>
          <div>
            <p style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px">${esc(c.title)}</p>
            <div class="cd-meta">
              <span class="type-tag" style="background:${m.bg};color:${m.c}">${c.type}</span>
              <span class="cd-date">${fmtShort(c.date)}</span>
            </div>
          </div>
        </div>`;
      }).join('');

  return `<div class="page">
    <div class="home-hd"><h1 class="trackr-logo">Trackr</h1></div>

    <div class="card">
      <p class="card-title">Habitudes — ${new Date().toLocaleDateString('fr-FR',{month:'long'})}</p>
      <div class="flex-row" style="gap:16px;align-items:center">
        ${donut(pct,90)}
        <div style="flex:1">${monthChart()}</div>
      </div>
      <p style="margin-top:10px;font-size:12px;color:var(--text-mid)">${done}/${S.habits.length} habitudes complétées</p>
    </div>

    <div class="card">
      <p class="card-title">À faire aujourd'hui</p>
      ${todoHtml}
    </div>

    <div class="card">
      <p class="card-title">Prochaines échéances</p>
      ${cdHtml}
    </div>
  </div>`;
}

function pgHabits() {
  const tk=todayKey();
  const dh=S.history[tk]||{};
  const done=S.habits.filter(h=>dh[h.id]).length;
  const pct=S.habits.length ? Math.round(done/S.habits.length*100) : 0;

  const rows=S.habits.map(h=>{
    const ok=!!dh[h.id];
    if(S.editH) return `<div class="habit-row" style="background:var(--bg)">
      <span class="h-icon">${h.icon}</span>
      <span class="h-name">${esc(h.name)}</span>
      <button class="h-del" onclick="delHabit('${h.id}')">✕</button>
    </div>`;
    return `<div class="habit-row" style="background:${ok?hexA(h.color,.1):'var(--bg)'};border-color:${ok?hexA(h.color,.25):'transparent'}" onclick="togHabit('${h.id}')">
      <span class="h-icon" style="opacity:${ok?1:.55}">${h.icon}</span>
      <span class="h-name ${ok?'done':''}">${esc(h.name)}</span>
      <div class="h-check" style="${ok?'background:'+h.color+';border-color:'+h.color:''}">
        ${ok?'<span style="color:white;font-size:11px;line-height:1">✓</span>':''}
      </div>
    </div>`;
  }).join('');

  const addRow=S.editH?`<div class="add-row" style="margin-top:10px">
    <input class="add-inp" id="h-inp" placeholder="Nouvelle habitude..." onkeydown="if(event.key==='Enter')addHabit()">
    <button class="add-btn" onclick="addHabit()">+</button>
  </div>`:'';

  return `<div class="page">
    <div class="ph">
      <h2 class="page-title">Habitudes</h2>
      <p class="page-sub">${fmtFull(activeDay())}</p>
    </div>

    <div class="card flex-row" style="gap:16px">
      ${donut(pct,80)}
      <div>
        <p style="font-size:22px;font-weight:600;color:var(--text);margin-bottom:2px">${done}/${S.habits.length}</p>
        <p style="font-size:12px;color:var(--text-mid)">habitudes complétées</p>
      </div>
    </div>

    <div class="card">
      <div class="flex-bet" style="margin-bottom:12px">
        <p class="card-title" style="margin:0">Aujourd'hui</p>
        <button class="edit-btn" onclick="togEditH()">${S.editH?'Terminé':'Modifier'}</button>
      </div>
      ${rows}${addRow}
    </div>

    <div class="card">
      <p class="card-title">7 derniers jours</p>
      ${bars7()}
    </div>
  </div>`;
}

function pgTodos() {
  const key=curKey();
  const tds=S.todos[key]||[];
  const done=tds.filter(t=>t.completed).length;

  const rows=tds.map(t=>`<div class="todo-row">
    <button class="t-chk" style="${t.completed?'background:#4A6741;border-color:#4A6741':''}" onclick="togTodo('${t.id}')">
      ${t.completed?'<span style="color:white;font-size:11px;line-height:1">✓</span>':''}
    </button>
    <span class="t-text ${t.completed?'done':''}">${esc(t.text)}</span>
    <button class="t-del" onclick="delTodo('${t.id}')">×</button>
  </div>`).join('');

  return `<div class="page">
    <div class="ph"><h2 class="page-title">À faire</h2></div>

    <div class="day-toggle">
      <button class="day-btn ${!S.tmrw?'active':''}" onclick="setDay(false)">Aujourd'hui</button>
      <button class="day-btn ${S.tmrw?'active':''}" onclick="setDay(true)">Demain</button>
    </div>

    ${tds.length>0?`<p class="meta-txt">${done}/${tds.length} complétées${!S.tmrw?' <span class="sep">· Réinitialisation à 5h</span>':''}</p>`:''}

    <div class="card">
      ${tds.length===0?`<p class="empty">${S.tmrw?'Prépare ta journée de demain':"Aucune tâche pour aujourd'hui"}</p>`:rows}
      <div class="add-row">
        <input class="add-inp" id="t-inp" placeholder="Ajouter une tâche..." onkeydown="if(event.key==='Enter')addTodo()">
        <button class="add-btn" onclick="addTodo()">+</button>
      </div>
    </div>
  </div>`;
}

function pgCd() {
  const sorted=[...S.cds].map(c=>({...c,days:daysUntil(c.date)}))
    .filter(c=>c.days>=0).sort((a,b)=>a.days-b.days);

  const items=sorted.length===0
    ? '<div class="card"><p class="empty">Aucune échéance à venir</p></div>'
    : sorted.map(c=>{
        const m=TYPE[c.type]||TYPE['Événement'];
        const urg=c.days<=3;
        return `<div class="cd-item" style="${urg?'border-color:'+m.c+'40':''}">
          <div class="cd-badge" style="background:${m.bg}">
            ${c.days===0
              ?`<span style="font-size:10px;font-weight:700;color:${m.c};letter-spacing:.05em">TODAY</span>`
              :`<span class="cd-days" style="color:${m.c}">${c.days}</span>
                <span class="cd-j" style="color:${m.c}">JOURS</span>`}
          </div>
          <div style="flex:1">
            <p class="cd-title">${esc(c.title)}</p>
            <div class="cd-meta">
              <span class="type-tag" style="background:${m.bg};color:${m.c}">${c.type}</span>
              <span class="cd-date">${fmtShort(c.date)}</span>
            </div>
          </div>
          <button class="t-del" onclick="delCd('${c.id}')">×</button>
        </div>`;
      }).join('');

  const pills=Object.keys(TYPE).map(t=>{
    const m=TYPE[t];
    const act=S.cdType===t;
    return `<button class="t-pill" style="${act?'background:'+m.c+';color:white':''}" onclick="setCdType('${t}')">${t}</button>`;
  }).join('');

  const form=S.addCd?`<div class="card" style="border:1px solid rgba(74,103,65,.2);margin-bottom:12px">
    <p class="card-title">Nouvelle échéance</p>
    <input class="form-inp" id="cd-ttl" placeholder="Nom de l'événement">
    <input class="form-inp" id="cd-dt" type="date">
    <div class="type-pills">${pills}</div>
    <button class="submit-btn" onclick="addCd()">Ajouter</button>
  </div>`:'';

  return `<div class="page">
    <div class="ph ph-row">
      <div>
        <h2 class="page-title">Échéances</h2>
        <p class="page-sub">Countdowns</p>
      </div>
      <button class="fab" onclick="togAddCd()">${S.addCd?'×':'+'}</button>
    </div>
    ${form}${items}
  </div>`;
}

/* ════════════════════════════════
   ACTIONS
════════════════════════════════ */
function togHabit(id){
  const tk=todayKey();
  if(!S.history[tk]) S.history[tk]={};
  S.history[tk][id]=!S.history[tk][id];
  save(); render();
}
function togEditH(){ S.editH=!S.editH; render(); }
function addHabit(){
  const el=document.getElementById('h-inp'); if(!el||!el.value.trim()) return;
  const icons=['📌','🎯','⚡','🔥','💡','🌟','✅','🏆'];
  const colors=['#5B7A4E','#4A8EBF','#C4953A','#7B6FA8','#C47845','#5A9E8F','#B85C4A','#4A6741'];
  const i=S.habits.length%icons.length;
  S.habits.push({id:Date.now()+'',name:el.value.trim(),icon:icons[i],color:colors[i]});
  save(); render();
}
function delHabit(id){ S.habits=S.habits.filter(h=>h.id!==id); save(); render(); }

function addTodo(){
  const el=document.getElementById('t-inp'); if(!el||!el.value.trim()) return;
  const key=curKey(); if(!S.todos[key]) S.todos[key]=[];
  S.todos[key].push({id:Date.now()+'',text:el.value.trim(),completed:false});
  save(); render();
}
function togTodo(id){
  const key=curKey();
  S.todos[key]=(S.todos[key]||[]).map(t=>t.id===id?{...t,completed:!t.completed}:t);
  save(); render();
}
function delTodo(id){
  const key=curKey();
  S.todos[key]=(S.todos[key]||[]).filter(t=>t.id!==id);
  save(); render();
}
function setDay(b){ S.tmrw=b; render(); }

function togAddCd(){ S.addCd=!S.addCd; render(); }
function setCdType(t){ S.cdType=t; render(); }
function addCd(){
  const ttl=document.getElementById('cd-ttl')?.value?.trim();
  const dt=document.getElementById('cd-dt')?.value;
  if(!ttl||!dt) return;
  S.cds.push({id:Date.now()+'',title:ttl,date:dt,type:S.cdType});
  S.addCd=false; save(); render();
}
function delCd(id){ S.cds=S.cds.filter(c=>c.id!==id); save(); render(); }

/* ════════════════════════════════
   ROUTER
════════════════════════════════ */
function go(tab){
  S.tab=tab; S.editH=false;
  ['home','habits','todos','cd'].forEach(t=>
    document.getElementById('nb-'+t)?.classList.toggle('active',t===tab));
  render();
}

function render(){
  const pg=document.getElementById('pg');
  if(S.tab==='home')   pg.innerHTML=pgHome();
  if(S.tab==='habits') pg.innerHTML=pgHabits();
  if(S.tab==='todos')  pg.innerHTML=pgTodos();
  if(S.tab==='cd')     pg.innerHTML=pgCd();
  ['home','habits','todos','cd'].forEach(t=>
    document.getElementById('nb-'+t)?.classList.toggle('active',t===S.tab));
}

const wel=document.getElementById('welcome');
let ty=null;
wel.addEventListener('touchstart',e=>{ty=e.touches[0].clientY},{passive:true});
wel.addEventListener('touchend',e=>{
  if(ty!==null&&ty-e.changedTouches[0].clientY>50) revealApp();
  ty=null;
});
wel.addEventListener('wheel',e=>{if(e.deltaY>20) revealApp()},{passive:true});
function revealApp(){ wel.classList.add('gone'); }

/* ════════════════════════════════
   UTILS
════════════════════════════════ */
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function hexA(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ── PWA Manifest ─────────────────────────────────────────────────
(function setupPWA() {
  // Convert base64 data URI -> Blob URL (required for apple-touch-icon + manifest)
  function toBlob(dataURI) {
    const b64 = dataURI.split(',')[1];
    const bytes = atob(b64);
    const arr = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
    return URL.createObjectURL(new Blob([arr], { type: 'image/jpeg' }));
  }

  const urlGreen    = toBlob(ICON_GREEN);
  const urlWordmark = toBlob(ICON_WORDMARK);

  // Favicon (browser tab) = logo vert
  document.getElementById('pwa-favicon').href = urlGreen;

  // Apple touch icon (iOS home screen) = wordmark
  document.getElementById('pwa-icon').href = urlWordmark;

  // Manifest avec blob URLs
  const manifest = {
    name: 'Trackr',
    short_name: 'Trackr',
    description: 'Your personal academic weapon',
    start_url: '.',
    display: 'standalone',
    orientation: 'portrait',
    background_color: '#F0E9DF',
    theme_color: '#F0E9DF',
    icons: [
      { src: urlGreen,    sizes: '512x512', type: 'image/jpeg', purpose: 'any'      },
      { src: urlWordmark, sizes: '512x512', type: 'image/jpeg', purpose: 'maskable' },
    ]
  };
  const mBlob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
  const mLink = document.createElement('link');
  mLink.rel  = 'manifest';
  mLink.href = URL.createObjectURL(mBlob);
  document.head.appendChild(mLink);
})();
