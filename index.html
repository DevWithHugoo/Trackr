  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #F0E9DF;
      --card:       #E6DDD2;
      --card-deep:  #D9CFC3;
      --text:       #2C1F14;
      --text-mid:   #6B5441;
      --text-light: #9B8572;
      --green:      #4A6741;
      --accent:     #8B5C2A;
      --nav-bg:     #EAE2D8;
      --nav-border: #D4C9BC;
      --chk-border: #C8BDB0;
      --r:          20px;
      --r-sm:       12px;
    }

    /* ─── DARK THEME ─── */
    body.dark {
      --bg:         #17130F;
      --card:       #241E18;
      --card-deep:  #322A22;
      --text:       #F0E9DF;
      --text-mid:   #C6B6A4;
      --text-light: #8E7E6E;
      --green:      #7CA36B;
      --accent:     #D0A06A;
      --nav-bg:     #1F1A15;
      --nav-border: #322A22;
      --chk-border: #4A4038;
    }
    html, body { transition: background .3s ease, color .3s ease; }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    * { -webkit-tap-highlight-color: transparent; }

    /* ─── WELCOME ─── */
    #welcome {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 300;
      transition: transform .8s cubic-bezier(.76,0,.24,1);
      cursor: pointer; user-select: none;
    }
    #welcome.gone { transform: translateY(-100%); pointer-events: none; }

    .w-hi {
      font-family: 'Cormorant Garamond', serif;
      font-size: 52px; font-weight: 300;
      color: var(--text); line-height: 1;
    }
    .w-aw {
      font-family: 'Cormorant Garamond', serif;
      font-size: 52px; font-weight: 300;
      color: var(--green); line-height: 1.1;
      margin-bottom: 18px;
    }
    .w-date {
      font-size: 14px; color: var(--text-mid);
      letter-spacing: .02em; margin-bottom: 64px;
    }
    .swipe-wrap {
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
    }
    .swipe-circle {
      width: 38px; height: 38px; border-radius: 50%;
      border: 1.5px solid var(--text-light);
      display: flex; align-items: center; justify-content: center;
      animation: bob 1.7s ease-in-out infinite;
    }
    .swipe-lbl {
      font-size: 10px; letter-spacing: .18em;
      color: var(--text-light); text-transform: uppercase;
    }
    @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }

    /* ─── APP SHELL ─── */
    #app {
      max-width: 430px; margin: 0 auto;
      min-height: 100vh; position: relative;
    }

    /* ─── PAGES ─── */
    .page { padding: 0 16px 96px; min-height: 100vh; }

    .ph { padding: 22px 0 14px; }
    .ph-row { display: flex; align-items: flex-end; justify-content: space-between; }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px; font-weight: 500; color: var(--text);
    }
    .page-sub { font-size: 13px; color: var(--text-mid); margin-top: 3px; }

    /* ─── HOME HEADER ─── */
    .home-hd { text-align: center; padding: 22px 0 12px; }
    .trackr-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 34px; font-weight: 500;
      color: var(--accent); letter-spacing: .06em;
    }

    /* ─── CARDS ─── */
    .card {
      background: var(--card);
      border-radius: var(--r);
      padding: 16px; margin-bottom: 12px;
    }
    .card-title {
      font-size: 10px; font-weight: 500;
      letter-spacing: .14em; text-transform: uppercase;
      color: var(--text-light); margin-bottom: 14px;
    }

    /* ─── DONUT ─── */
    .donut-wrap {
      position: relative;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .donut-inner {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 600; color: var(--text);
    }

    /* ─── HABITS ─── */
    .habit-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px; border-radius: 13px;
      cursor: pointer; border: 1px solid transparent;
      transition: background .22s, border-color .22s;
      margin-bottom: 6px;
    }
    .habit-row:last-child { margin-bottom: 0; }
    .h-icon { font-size: 20px; transition: opacity .22s; }
    .h-name {
      flex: 1; font-size: 14px; color: var(--text);
      transition: color .22s, text-decoration .22s;
    }
    .h-name.done { color: var(--text-light); text-decoration: line-through; }
    .h-check {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid var(--chk-border); background: transparent;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all .22s;
      font-size: 11px; color: white; line-height: 1;
    }
    .h-del {
      background: none; border: none;
      color: #B85C4A; font-size: 16px; cursor: pointer; padding: 0 4px;
    }

    /* ─── BARS ─── */
    .bars { display: flex; gap: 6px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .bar-track {
      width: 100%; height: 60px;
      background: var(--card-deep); border-radius: 7px;
      position: relative; overflow: hidden;
    }
    .bar-fill {
      position: absolute; bottom: 0; left: 0; right: 0;
      border-radius: 7px;
      transition: height .5s cubic-bezier(.4,0,.2,1);
    }
    .bar-lbl { font-size: 9px; color: var(--text-light); }
    .bar-lbl.today { color: var(--text); font-weight: 600; }

    /* ─── DAY TOGGLE ─── */
    .day-toggle {
      display: flex; background: var(--card);
      border-radius: 13px; padding: 4px; margin-bottom: 12px;
    }
    .day-btn {
      flex: 1; padding: 8px 3px; border: none;
      background: transparent; border-radius: 10px;
      font-size: 12px; font-family: 'DM Sans', sans-serif;
      color: var(--text-light); cursor: pointer;
      transition: all .2s; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .day-btn.active { background: var(--bg); color: var(--text); font-weight: 500; }

    /* ─── TODO ─── */
    .todo-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 0; border-bottom: 1px solid var(--card-deep);
    }
    .todo-row:last-of-type { border-bottom: none; }
    .t-chk {
      width: 20px; height: 20px; border-radius: 5px;
      border: 2px solid #B8AB9E; background: transparent;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s; font-size: 11px; color: white; line-height: 1;
    }
    .t-text {
      flex: 1; font-size: 14px; color: var(--text); transition: all .22s;
    }
    .t-text.done { color: var(--text-light); text-decoration: line-through; }
    .t-del {
      background: none; border: none;
      color: #C8B8A8; font-size: 20px; cursor: pointer;
      padding: 0 2px; line-height: 1; flex-shrink: 0;
    }

    /* ─── INPUTS ─── */
    .add-row { display: flex; gap: 8px; margin-top: 12px; }
    .add-inp {
      flex: 1; padding: 10px 12px;
      background: var(--bg); border: none;
      border-radius: 11px; font-size: 13px;
      color: var(--text); font-family: 'DM Sans', sans-serif; outline: none;
    }
    .add-inp::placeholder { color: var(--text-light); }
    .add-btn {
      width: 40px; height: 40px; flex-shrink: 0;
      background: var(--green); color: white;
      border: none; border-radius: 11px;
      font-size: 22px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s;
    }
    .add-btn:active { transform: scale(.9); }

    .form-inp {
      width: 100%; padding: 10px 12px;
      background: var(--bg); border: none;
      border-radius: 11px; font-size: 13px;
      color: var(--text); font-family: 'DM Sans', sans-serif;
      outline: none; margin-bottom: 9px;
    }
    .form-inp::placeholder { color: var(--text-light); }

    .type-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .t-pill {
      padding: 6px 11px; border: none; border-radius: 8px;
      font-size: 11px; background: var(--card-deep);
      color: var(--text-mid); cursor: pointer;
      font-family: 'DM Sans', sans-serif; transition: all .18s;
    }
    .submit-btn {
      width: 100%; padding: 11px;
      background: var(--green); color: white;
      border: none; border-radius: 11px;
      font-size: 13px; font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: opacity .2s;
    }
    .submit-btn:active { opacity: .85; }

    /* ─── EDIT BTN ─── */
    .edit-btn {
      font-size: 11px; background: none; border: none;
      color: var(--accent); cursor: pointer;
      font-weight: 500; letter-spacing: .05em;
      font-family: 'DM Sans', sans-serif;
    }

    /* ─── FAB ─── */
    .fab {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--green); color: white;
      border: none; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .18s;
    }
    .fab:active { transform: scale(.9); }

    /* ─── COUNTDOWN ─── */
    .cd-item {
      background: var(--card); border-radius: var(--r);
      padding: 14px 16px;

    .modal {

</head>

<script>
/* ════════════════════════════════

const DEF_HABITS = [

const TYPE = {

// Emojis proposés pour une nouvelle habitude
const HABIT_EMOJIS = ['📌','🎯','⚡','🔥','💡','🌟','✅','🏆','📖','📚','💧','🏋️','🧘','🎨','🎵','🍎','💪','🌱','☕','🧠','🏃','🛏️','🎧','💰'];

// Style pour un type d'échéance personnalisé (non prédéfini)
const CUSTOM_TYPE = { c: '#8B5C2A', bg: 'rgba(139,92,42,.13)' };

/* ════════════════════════════════
   STORAGE
════════════════════════════════ */
// ⚠️ STORAGE KEYS — NE JAMAIS MODIFIER CES NOMS ⚠️
// Changer ces clés détruirait les données sauvegardées des utilisateurs.
// Toute modification du code doit conserver ces 4 identifiants exacts.
//
//   'trk_h'  → config des habitudes  (S.habits)
//   'trk_hi' → historique quotidien  (S.history)
//   'trk_t'  → todos par jour        (S.todos)
//   'trk_c'  → countdowns            (S.cds)
//
const KEYS = Object.freeze({
  habits:  'trk_h',
  history: 'trk_hi',
  todos:   'trk_t',
  cds:     'trk_c',
  settings:'trk_s',   // nouveau — prénom + mode sombre
});
// ─────────────────────────────────────────────

function save() {
  try { localStorage.setItem(KEYS.habits,  JSON.stringify(S.habits));  } catch(e){}
  try { localStorage.setItem(KEYS.history, JSON.stringify(S.history)); } catch(e){}
  try { localStorage.setItem(KEYS.todos,   JSON.stringify(S.todos));   } catch(e){}
  try { localStorage.setItem(KEYS.cds,     JSON.stringify(S.cds));     } catch(e){}
  try { localStorage.setItem(KEYS.settings, JSON.stringify({ name: S.name, dark: S.dark })); } catch(e){}
}
function load() {
  try { const v=localStorage.getItem(KEYS.habits);  if(v) S.habits  = JSON.parse(v); } catch(e){}
  try { const v=localStorage.getItem(KEYS.history); if(v) S.history = JSON.parse(v); } catch(e){}
  try { const v=localStorage.getItem(KEYS.todos);   if(v) S.todos   = JSON.parse(v); } catch(e){}
  try { const v=localStorage.getItem(KEYS.cds);     if(v) S.cds     = JSON.parse(v); } catch(e){}
  try { const v=localStorage.getItem(KEYS.settings); if(v){ const s=JSON.parse(v); S.name = s.name||''; S.dark = !!s.dark; } } catch(e){}
}

/* ════════════════════════════════
   DATE UTILS
════════════════════════════════ */
function activeDay() {
  const n = new Date();
  if (n.getHours() < 5) { const d=new Date(n); d.setDate(d.getDate()-1); return d; }
  return n;
}
function toKey(d)   { return d.toISOString().split('T')[0]; }
function todayKey() { return toKey(activeDay()); }
function tmrwKey()  { const d=new Date(activeDay()); d.setDate(d.getDate()+1); return toKey(d); }

// Numéro de semaine ISO (semaine commençant le lundi)
function isoWeek(d) {
  const dt = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = (dt.getUTCDay() + 6) % 7;        // lundi = 0
  dt.setUTCDate(dt.getUTCDate() - dayNum + 3);     // jeudi de la semaine
  const firstThu = new Date(Date.UTC(dt.getUTCFullYear(), 0, 4));
  const firstDayNum = (firstThu.getUTCDay() + 6) % 7;
  firstThu.setUTCDate(firstThu.getUTCDate() - firstDayNum + 3);
  const week = 1 + Math.round((dt - firstThu) / (7 * 86400000));
  return { year: dt.getUTCFullYear(), week };
}
function weekKey()  { const w = isoWeek(activeDay()); return `W${w.year}-${String(w.week).padStart(2,'0')}`; }
function monthKey() { const d = activeDay(); return `M${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }

// Clé de la liste de tâches actuellement affichée (échelle de temps active)
function curKey() {
  if (S.todoScope === 'tomorrow') return tmrwKey();
  if (S.todoScope === 'week')     return weekKey();
  if (S.todoScope === 'month')    return monthKey();
  return todayKey();
}

// Salutations selon l'heure, à la façon de Claude (anglais)
const GREETINGS = {
  morning:   ['Good morning', 'Rise and shine', 'Morning'],
  afternoon: ['Good afternoon', 'Afternoon', 'Hope your day is going well'],
  evening:   ['Good evening', 'Evening', 'Winding down'],
  night:     ['Working late', 'Burning the midnight oil', 'Still up'],
};
function greeting() {
  const h = new Date().getHours();
  let period;
  if      (h >= 5  && h < 12) period = 'morning';
  else if (h >= 12 && h < 17) period = 'afternoon';
  else if (h >= 17 && h < 22) period = 'evening';
  else                        period = 'night';
  const list = GREETINGS[period];
  return list[Math.floor(Math.random() * list.length)];
}
function daysUntil(s) {
  const t=new Date(s+'T00:00:00'), n=new Date(); n.setHours(0,0,0,0);
  return Math.ceil((t-n)/86400000);
}
function fmtShort(s) {
  return new Date(s+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
}
function fmtFull(d) {
  const s = d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  return s.charAt(0).toUpperCase()+s.slice(1);
}

/* ════════════════════════════════
   SVG HELPERS
════════════════════════════════ */
function donut(pct, size=88) {
  const r=(size-14)/2, ci=2*Math.PI*r, off=(ci*(1-pct/100)).toFixed(2);
  return `<div class="donut-wrap" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#D9CFC3" stroke-width="12"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none"
        stroke="#4A6741" stroke-width="12" stroke-linecap="round"
        stroke-dasharray="${ci.toFixed(2)}" stroke-dashoffset="${off}"
        style="transition:stroke-dashoffset .75s cubic-bezier(.4,0,.2,1)"/>
    </svg>
    <div class="donut-inner">${pct}%</div>
  </div>`;
}

function monthChart() {
  const now=new Date(), yr=now.getFullYear(), mo=now.getMonth();
  const dim=new Date(yr,mo+1,0).getDate(), td=now.getDate();
  const W=210, H=78, PX=18, PY=8, pW=W-PX*2, pH=H-PY*2;

  const pts=[];
  for(let day=1;day<=td;day++){
    const d=new Date(yr,mo,day), key=toKey(d);
    const dh=S.history[key]||{};
    const p=S.habits.length ? S.habits.filter(h=>dh[h.id]).length/S.habits.length : 0;
    pts.push([(PX+((day-1)/Math.max(dim-1,1))*pW).toFixed(1),(PY+(1-p)*pH).toFixed(1)]);
  }

  const ok = pts.length>=2;
  const line = ok ? 'M '+pts.map(p=>p.join(',')).join(' L ') : '';
  const area = ok ? `M ${PX},${H-PY} L ${pts.map(p=>p.join(',')).join(' L ')} L ${pts[pts.length-1][0]},${H-PY} Z` : '';

  const xlbls=[1,8,15,22,dim].map(day=>{
    const x=(PX+((day-1)/Math.max(dim-1,1))*pW).toFixed(1);
    return `<text x="${x}" y="${H+14}" text-anchor="middle" font-size="7.5" fill="#9B8572" font-family="DM Sans,sans-serif">${day}</text>`;
  }).join('');

  const grid=[0,.5,1].map(v=>
    `<line x1="${PX}" y1="${(PY+v*pH).toFixed(1)}" x2="${PX+pW}" y2="${(PY+v*pH).toFixed(1)}" stroke="#C8BDB0" stroke-width=".5"/>`
  ).join('');

  const lp=pts[pts.length-1];
  return `<svg width="${W}" height="${H+20}" overflow="visible">
    <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A6741" stop-opacity=".2"/>
      <stop offset="100%" stop-color="#4A6741" stop-opacity="0"/>
    </linearGradient></defs>
    ${grid}
    ${area?`<path d="${area}" fill="url(#ag)"/>`:''}
    ${line?`<path d="${line}" fill="none" stroke="#4A6741" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`:''}
    ${lp?`<circle cx="${lp[0]}" cy="${lp[1]}" r="3.5" fill="#4A6741"/>`:''}
    ${xlbls}
  </svg>`;
}

function bars7() {
  const tk=todayKey();
  return '<div class="bars">'+Array.from({length:7},(_,i)=>{
    const d=new Date(activeDay()); d.setDate(d.getDate()-(6-i));
    const key=toKey(d);
    const dh=S.history[key]||{};
    const p=S.habits.length ? Math.round(S.habits.filter(h=>dh[h.id]).length/S.habits.length*100) : 0;
    const isT=key===tk;
    const lbl=d.toLocaleDateString('fr-FR',{weekday:'short'}).slice(0,2);
    return `<div class="bar-col">
      <div class="bar-track">
        <div class="bar-fill" style="height:${p}%;background:${isT?'#4A6741':'rgba(74,103,65,.5)'}"></div>
      </div>
      <span class="bar-lbl ${isT?'today':''}">${lbl}</span>
    </div>`;
  }).join('')+'</div>';
}

/* ════════════════════════════════
   RENDER PAGES
════════════════════════════════ */
// Petit badge d'autocollant pour l'aperçu (accueil)
function tagBadges(t) {
  let s = '';
  if (t.urgent)    s += '<span class="mini-tag urg">Urgent</span>';
  if (t.important) s += '<span class="mini-tag imp">Important</span>';
  return s ? `<span style="display:flex;gap:4px;flex-shrink:0;margin-left:auto">${s}</span>` : '';
}

// Aperçu d'une liste de tâches pour un widget d'accueil
function todoPreview(key, emptyMsg) {
  const tds = S.todos[key] || [];
  if (tds.length === 0) return `<p class="empty">${emptyMsg}</p>`;
  return tds.slice(0,4).map((t,i,a)=>`
    <div class="flex-row" style="gap:10px;padding:7px 0;border-bottom:${i<a.length-1?'1px solid var(--card-deep)':'none'}">
      <div style="width:16px;height:16px;border-radius:4px;border:2px solid ${t.completed?'var(--green)':'#B8AB9E'};background:${t.completed?'var(--green)':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
        ${t.completed?'<span style="color:white;font-size:9px;line-height:1">✓</span>':''}
      </div>
      <span style="font-size:13px;color:${t.completed?'var(--text-light)':'var(--text)'};text-decoration:${t.completed?'line-through':'none'}">${esc(t.text)}</span>
      ${tagBadges(t)}
    </div>`).join('')
    + (tds.length>4?`<p style="font-size:11px;color:var(--text-light);margin-top:6px">+${tds.length-4} autres tâches</p>`:'');
}

// Modale de paramètres
function settingsModal() {
  if (!S.showSettings) return '';
  return `<div class="modal-back" onclick="if(event.target===this)toggleSettings()">
    <div class="modal">
      <div class="modal-hd">
        <span class="modal-title">Paramètres</span>
        <button class="modal-close" onclick="toggleSettings()">×</button>
      </div>

      <div class="set-row">
        <div>

function pgCd() {

  const items=sorted.length===0

              ?`<span style="font-size:10px;font-weight:700;color:${mm.c};letter-spacing:.05em">TODAY</span>`
              :`<span class="cd-days" style="color:${mm.c}">${c.days}</span>

              <span class="type-tag" style="background:${mm.bg};color:${mm.c}">${esc(c.type)}</span>

  + `<button class="t-pill" style="${S.cdType==='__custom__'?'background:'+CUSTOM_TYPE.c+';color:white':''}" onclick="setCdType('__custom__')">…</button>`;

  const customField = S.cdType==='__custom__'
    ? `<input class="form-inp" id="cd-custom" placeholder="Votre libellé personnalisé"

  const form=S.addCd?`<div class="card" style="border:1px solid rgba(74,103,65,.2);margin-bottom:12px">
    <p class="card-title">Nouvelle échéance</p>

  return `<div class="page">

  </div>`;
}

/* ════════════════════════════════
   ACTIONS
════════════════════════════════ */
function togHabit(id){
  const tk=todayKey();
  if(!S.history[tk]) S.history[tk]={};
  S.history[tk][id]=!S.history[tk][id];
  save(); render();
}
function togEditH(){
  S.editH=!S.editH;
  if(!S.editH){ S.newHabitDraft=''; S.newHabitIcon='📌'; }  // réinitialise le brouillon en quittant
  render();
}
function pickHabitIcon(e){
  const el=document.getElementById('h-inp'); if(el) S.newHabitDraft=el.value; // conserve le texte saisi
  S.newHabitIcon=e;
  render();
}
function addHabit(){
  const el=document.getElementById('h-inp');
  const name=sanitizeText((el?el.value:S.newHabitDraft)||'').trim();
  if(!name) return;
  const colors=['#5B7A4E','#4A8EBF','#C4953A','#7B6FA8','#C47845','#5A9E8F','#B85C4A','#4A6741'];
  const color=colors[S.habits.length%colors.length];
  S.habits.push({id:Date.now()+'',name,icon:S.newHabitIcon,color});
  S.newHabitDraft=''; S.newHabitIcon='📌';
  save(); render();
}
function delHabit(id){ S.habits=S.habits.filter(h=>h.id!==id); save(); render(); }

function addTodo(){
  const el=document.getElementById('t-inp');
  const text=sanitizeText(el?el.value:'').trim();
  if(!text) return;
  const key=curKey(); if(!S.todos[key]) S.todos[key]=[];
  S.todos[key].push({id:Date.now()+'',text,completed:false,important:false,urgent:false});
  save(); render();
}
function togTodo(id){
  const key=curKey();
  S.todos[key]=(S.todos[key]||[]).map(t=>t.id===id?{...t,completed:!t.completed}:t);
  save(); render();
}
function togTag(id,tag){  // autocollants cumulables (important / urgent)
  const key=curKey();
  S.todos[key]=(S.todos[key]||[]).map(t=>t.id===id?{...t,[tag]:!t[tag]}:t);
  save(); render();
}
function delTodo(id){
  const key=curKey();
  S.todos[key]=(S.todos[key]||[]).filter(t=>t.id!==id);
  save(); render();
}
function setScope(s){ S.todoScope=s; render(); }

function togAddCd(){ S.addCd=!S.addCd; render(); }
function setCdType(t){ S.cdType=t; render(); }
function addCd(){
  const ttl=sanitizeText(document.getElementById('cd-ttl')?.value||'').trim();
  const dt=document.getElementById('cd-dt')?.value;
  if(!ttl||!dt) return;
  let type=S.cdType;
  if(type==='__custom__'){
    type=sanitizeText(document.getElementById('cd-custom')?.value||S.cdCustom||'').trim() || 'Autre';
  }
  S.cds.push({id:Date.now()+'',title:ttl,date:dt,type});
  S.addCd=false; S.cdType='Événement'; S.cdCustom='';
  save(); render();
}
function delCd(id){ S.cds=S.cds.filter(c=>c.id!==id); save(); render(); }

/* ── PARAMÈTRES ── */
function toggleSettings(){ S.showSettings=!S.showSettings; render(); }
function toggleDark(){ S.dark=!S.dark; applyTheme(); save(); render(); }
function setName(v){          // prénom : lettres uniquement, pas de re-render (garde le focus)
  S.name=sanitizeName(v);
  const el=document.getElementById('name-inp');
  if(el && el.value!==S.name) el.value=S.name;

}
function applyTheme(){
  document.body.classList.toggle('dark', S.dark);
  const m=document.querySelector('meta[name="theme-color"]');
  if(m) m.content = S.dark ? '#17130F' : '#F0E9DF';
}

function go(tab){
  S.tab=tab; S.editH=false; S.showSettings=false;
  ['home','habits','todos','cd'].forEach(t=>
    document.getElementById('nb-'+t)?.classList.toggle('active',t===tab));

function render(){

  if(S.tab==='home')   pg.innerHTML=pgHome();
  if(S.tab==='habits') pg.innerHTML=pgHabits();
  if(S.tab==='todos')  pg.innerHTML=pgTodos();

  ['home','habits','todos','cd'].forEach(t=>
    document.getElementById('nb-'+t)?.classList.toggle('active',t===S.tab));
}

   UTILS
════════════════════════════════ */
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function hexA(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

/* ── Sanitisation des entrées texte ──
   On n'autorise que lettres (accents compris), chiffres et espaces.
   Les caractères spéciaux (< > " ' ; & etc.) sont retirés pour éviter
   toute injection ou faille de sécurité. */
function sanitizeText(s){
  try { return String(s).replace(/[^\p{L}\p{N}\s]/gu,''); }
  catch(e){ return String(s).replace(/[^A-Za-z0-9À-ÿ\s]/g,''); }
}
// Prénom : lettres uniquement (+ espace et trait d'union pour les prénoms composés)
function sanitizeName(s){
  try { return String(s).replace(/[^\p{L}\s-]/gu,''); }
  catch(e){ return String(s).replace(/[^A-Za-zÀ-ÿ\s-]/g,''); }
}

// ── PWA Manifest ─────────────────────────────────────────────────
(function setupPWA() {
  // Convert base64 data URI -> Blob URL (required for apple-touch-icon + manifest)
  function toBlob(dataURI) {
    const mime = (dataURI.match(/^data:([^;]+);/) || [,'image/png'])[1];
    const b64 = dataURI.split(',')[1];
    const bytes = atob(b64);
    const arr = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
    return URL.createObjectURL(new Blob([arr], { type: mime }));
  }

  const urlApp = toBlob(ICON_APP);

  // Favicon (onglet navigateur) = nouveau logo
  document.getElementById('pwa-favicon').href = urlApp;

  // Apple touch icon (écran d'accueil iOS) = nouveau logo
  // apple-touch-icon est defini en dur dans le <head> (base64) — requis par iOS

  // Manifest avec blob URLs
  const manifest = {
    name: 'Trackr',
    short_name: 'Trackr',
    description: 'Your personal academic weapon',
    start_url: '.',
    display: 'standalone',
    orientation: 'portrait',
    background_color: '#F0E9DF',
    theme_color: '#F0E9DF',
    icons: [
      { src: urlApp, sizes: '512x512', type: 'image/png', purpose: 'any'      },
      { src: urlApp, sizes: '512x512', type: 'image/png', purpose: 'maskable' },
    ]
  };
  const mBlob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
  const mLink = document.createElement('link');
  mLink.rel  = 'manifest';
  mLink.href = URL.createObjectURL(mBlob);
  document.head.appendChild(mLink);
})();
// Charge les données AVANT d'afficher l'écran d'accueil (prénom + thème requis)
load();
applyTheme();

// Message d'accueil selon l'heure, à la façon de Claude, avec le prénom si renseigné
(function initWelcome(){
  const g = greeting();
  const hi = document.querySelector('.w-hi');
  const aw = document.querySelector('.w-aw');
  if (hi) hi.textContent = g + ',';
  if (aw) aw.textContent = S.name ? S.name : 'academic weapon';
  const wd = document.getElementById('w-date');
  if (wd) wd.textContent = fmtFull(new Date());
})();

go('home');
